name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ubuntu-26.04-server-bootc
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Just
        uses: extractions/setup-just@v3

      - name: Setup podman auth
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo mkdir -p /etc/containers
          echo "${GITHUB_TOKEN}" | sudo podman login \
            -u "oauth2accesstoken" --password-stdin \
            --authfile /root/.config/containers/auth.json ghcr.io

      - name: Pre-pull base image
        run: |
          sudo podman pull --authfile /root/.config/containers/auth.json \
            ghcr.io/ubuntu-bootc/ubuntu-26.04-bootc:latest

            - name: Build image
        run: sudo $(which just) build
        env:
          PODMAN_EXTRA_ARGS: --platform linux/${{ matrix.platform.arch }}

      - name: Run image structure tests
        run: just test-structure

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          sudo podman push \
            --authfile /root/.config/containers/auth.json \
            "${IMAGE_NAME}:latest" \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest-${{ matrix.platform.arch }}"

      - name: Save digest artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          sudo skopeo inspect --authfile /root/.config/containers/auth.json --no-tags \
            "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}:latest-${{ matrix.platform.arch }}" | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['Digest'])" \
            > /tmp/digests/${{ matrix.platform.arch }}.txt

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform.arch }}
          path: /tmp/digests/${{ matrix.platform.arch }}.txt

  manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    container:
      image: docker.io/library/alpine:latest
      options: --privileged
    steps:
      - name: Install tools
        run: |
          apk add bash coreutils podman
          mkdir -p /etc/containers
          printf '[storage]\ndriver = "vfs"\n' > /etc/containers/storage.conf

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: /tmp/digests

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | podman login \
            -u "oauth2accesstoken" --password-stdin ghcr.io

      - name: Create and push manifest
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -x
          TARGET="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          DATE="$(date -u +%Y%m%d)"
          podman manifest create "${TARGET}"
          for digest_file in /tmp/digests/*.txt; do
            PLATFORM="$(basename "${digest_file}" .txt)"
            DIGEST="$(cat "${digest_file}")"
            podman manifest add "${TARGET}" "${TARGET}@${DIGEST}" --arch "${PLATFORM}"
          done
          podman manifest push --all=false "${TARGET}" "${TARGET}:latest"
          podman manifest push --all=false "${TARGET}" "${TARGET}:${DATE}"
